<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Outer Red Gear -->
  <g fill="#ff3b30">
    <circle cx="16" cy="16" r="13" />
    <!-- 8 Gear Teeth -->
    <rect x="14" y="1" width="4" height="4" rx="1" transform="rotate(0 16 16)" />
    <rect x="14" y="1" width="4" height="4" rx="1" transform="rotate(45 16 16)" />
    <rect x="14" y="1" width="4" height="4" rx="1" transform="rotate(90 16 16)" />
    <rect x="14" y="1" width="4" height="4" rx="1" transform="rotate(135 16 16)" />
    <rect x="14" y="1" width="4" height="4" rx="1" transform="rotate(180 16 16)" />
    <rect x="14" y="1" width="4" height="4" rx="1" transform="rotate(225 16 16)" />
    <rect x="14" y="1" width="4" height="4" rx="1" transform="rotate(270 16 16)" />
    <rect x="14" y="1" width="4" height="4" rx="1" transform="rotate(315 16 16)" />
  </g>

  <!-- Inner Crest Canvas -->
  <circle cx="16" cy="16" r="10.5" fill="#ffffff" stroke="#ff3b30" stroke-width="0.75" />
  <circle cx="16" cy="16" r="9" fill="none" stroke="#eab308" stroke-width="0.75" />

  <!-- Academic Graduation Cap Emblem -->
  <g transform="translate(6, 6) scale(0.2)">
    <!-- Cap Diamond Shape -->
    <polygon points="50,15 90,32 50,49 10,32" fill="#1e293b" />
    <!-- Cap Base -->
    <path d="M 26,38 L 26,48 C 26,55 74,55 74,48 L 74,38" fill="#1e293b" />
    <!-- Golden Tassel -->
    <path d="M 50,32 L 80,38 L 80,50" fill="none" stroke="#eab308" stroke-width="3" stroke-linecap="round" />
    <circle cx="80" cy="51" r="4" fill="#eab308" />
  </g>

  <!-- Miniature Padlock Emblem -->
  <g transform="translate(13, 15) scale(0.15)">
    <!-- Padlock Shackle -->
    <path d="M 12,12 A 10,10 0 0,1 28,12" fill="none" stroke="#007aff" stroke-width="5.5" stroke-linecap="round" />
    <!-- Padlock Body -->
    <rect x="4" y="11" width="32" height="25" rx="5" fill="#007aff" />
    <!-- Tiny Keyhole -->
    <circle cx="20" cy="21" r="3" fill="#ffffff" />
    <polygon points="18.5,21 21.5,21 22,28 18,28" fill="#ffffff" />
  </g>
</svg>
